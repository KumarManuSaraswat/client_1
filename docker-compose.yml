version: '3.8'

services:
  # 1. MongoDB Database Service
  mongo:
    image: mongo:latest
    container_name: mern-mongo
    ports:
      - "27017:27017" # Optional: Exposes DB to host machine for MongoDB Compass
    volumes:
      - mongo-data:/data/db # Named volume to persist database data

  # 2. Node.js/Express Backend Service
  server:
    build: 
      context: ./server
    container_name: mern-server
    ports:
      - "5000:5000" # Maps host port 5000 to container port 5000
    environment:
      - PORT=5000
      # Notice we use "mongo:27017" here instead of "localhost" to use Docker's internal network
      - MONGODB_URI=mongodb://mongo:27017/mern_db 
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      - mongo

  # 3. React Frontend Service
  client:
    build: 
      context: ./client
    container_name: mern-client
    ports:
      - "3000:80" # Maps host port 3000 to Nginx container port 80
    depends_on:
      - server

# Define the named volume for MongoDB
volumes:
  mongo-data: